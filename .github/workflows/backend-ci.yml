name: Django CI Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/*"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # options Checking
        options: >-
          --tmpfs /var/lib/postgresql/data
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      DJANGO_SETTINGS_MODULE: backend.settings
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
      TU_API_KEY: ${{ secrets.TU_API_KEY }}
      DATABASE_URL: "postgres://myuser:mypassword@localhost:5432/testdb"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt
          pip install pytest pytest-django pytest-mock pluggy psycopg2-binary

      - name: Run Unit Tests
        run: |
          python -m pytest api/tests/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::108782062712:role/github-actions-ecr-role
          aws-region: ap-southeast-7

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Dockerfile Django
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/academic-dashboard/backend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/academic-dashboard/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
